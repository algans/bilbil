services:
  postgres:
    image: postgres:16-alpine
    container_name: bilbil-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: bilbil
      POSTGRES_PASSWORD: bilbil_dev
      POSTGRES_DB: bilbil
    volumes:
      - bilbil-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilbil -d bilbil"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bilbil-postgres-data:
